<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Hub - Authentication</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body style="background: linear-gradient(135deg, var(--soft-beige) 0%, var(--blush-pink) 100%);">
  <div class="container" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <!-- Login Form -->
    <div id="loginForm" class="form-container">
      <h1 class="form-title">Welcome Back</h1>
      <p class="form-subtitle">Sign in to your account</p>
      
      <form id="loginFormElement">
        <div class="form-group">
          <label for="loginUsername">Username or Email</label>
          <input type="text" id="loginUsername" placeholder="Enter your username or email" required>
          <span class="error-message" id="loginUsernameError"></span>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
          <span class="error-message" id="loginPasswordError"></span>
        </div>

        <div class="remember-me">
          <input type="checkbox" id="rememberMe" name="rememberMe">
          <label for="rememberMe">Remember me</label>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>

        <p class="form-footer" style="margin-top: 1.5rem;">
          Don't have an account?
          <button type="button" class="toggle-form-btn" onclick="toggleForms()">Sign up</button>
        </p>
      </form>
    </div>

    <!-- Signup Form -->
    <div id="signupForm" class="form-container" style="display: none;">
      <h1 class="form-title">Join Us</h1>
      <p class="form-subtitle">Create your account</p>
      
      <form id="signupFormElement">
        <div class="form-group">
          <label for="signupUsername">Username</label>
          <input type="text" id="signupUsername" placeholder="Choose a username" required>
          <span class="error-message" id="signupUsernameError"></span>
        </div>

        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="Enter your email" required>
          <span class="error-message" id="signupEmailError"></span>
        </div>

        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Create a password (min 6 chars)" required>
          <span class="error-message" id="signupPasswordError"></span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
          <span class="error-message" id="confirmPasswordError"></span>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>

        <p class="form-footer" style="margin-top: 1.5rem;">
          Already have an account?
          <button type="button" class="toggle-form-btn" onclick="toggleForms()">Sign in</button>
        </p>
      </form>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Toggle between login and signup forms
    function toggleForms() {
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');

      loginForm.style.display = loginForm.style.display === 'none' ? 'block' : 'none';
      signupForm.style.display = signupForm.style.display === 'none' ? 'block' : 'none';

      // Clear error messages
      clearErrorMessages();
    }

    // Clear error messages
    function clearErrorMessages() {
      document.querySelectorAll('.error-message').forEach(elem => elem.textContent = '');
    }

    // Handle Login
    document.getElementById('loginFormElement').addEventListener('submit', function(e) {
      e.preventDefault();
      clearErrorMessages();

      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      const result = loginUser(username, password, rememberMe);
      
      if (result.success) {
        showMessage(result.message, 'success');
        setTimeout(() => {
          window.location.href = 'home.html';
        }, 500);
      } else {
        showMessage(result.message, 'error');
      }
    });

    // Handle Signup
    document.getElementById('signupFormElement').addEventListener('submit', function(e) {
      e.preventDefault();
      clearErrorMessages();

      const username = document.getElementById('signupUsername').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      const result = registerUser(username, email, password, confirmPassword);
      
      if (result.success) {
        showMessage(result.message, 'success');
        setTimeout(() => {
          toggleForms(); // Switch to login form
          document.getElementById('loginUsername').value = username;
          document.getElementById('loginPassword').value = '';
        }, 500);
      } else {
        showMessage(result.message, 'error');
      }
    });

    // Redirect to home if already logged in
    window.addEventListener('DOMContentLoaded', function() {
      const currentUser = getCurrentUser();
      if (currentUser && validateSession()) {
        window.location.href = 'home.html';
      }
    });
  </script>
</body>
</html>
